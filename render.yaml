services:
  - type: web
    name: bakery-cloud-system
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /var/data/bakery.sqlite3
    disks:
      - name: bakery-data
        mountPath: /var/data
        sizeGB: 1
