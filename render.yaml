services:
  - type: web
    name: bakery-cloud-system-free
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: MIGRATE_SQLITE_ON_FIRST_RUN
        value: true
