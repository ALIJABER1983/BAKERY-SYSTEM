<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>نظام إدارة مشغل المهندس للمخبوزات</title>
<style>
:root {
  --navy:#1d2b47;
  --navy-soft:#304668;
  --orange:#f2a20b;
  --bg:#edf2f7;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);font-family:"Cairo","Tajawal","Segoe UI",Tahoma,Arial,sans-serif}
body{overflow:hidden;display:flex;flex-direction:column}
.topbar{background:var(--navy);padding:10px 18px 0;color:#fff;box-shadow:0 12px 30px rgba(14,26,44,.08)}
.top-inner{max-width:1500px;margin:0 auto}
.top-row{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.title-wrap{display:flex;align-items:center;gap:14px;color:#ffb320;font-size:30px;font-weight:900}
.left-tools{display:flex;gap:10px;align-items:center}
.pill-btn{background:var(--navy-soft);color:#fff;border:none;border-radius:12px;height:44px;padding:0 18px;font-size:16px;font-weight:800}
.tabs{display:flex;gap:10px;align-items:flex-end;overflow:auto;padding:8px 0 0}
.main-tab{background:var(--navy-soft);color:#dfe8f5;border:none;height:54px;padding:0 28px;font-size:18px;font-weight:800;white-space:nowrap;border-radius:16px 16px 0 0;cursor:pointer}
.main-tab.active{background:var(--orange);color:#1b2436}
.content{height:calc(100vh - 116px);max-width:1500px;width:100%;margin:0 auto;padding:0 18px 18px;flex:1}
iframe{width:100%;height:100%;border:none;background:#fff;border-radius:0 0 20px 20px;display:block}
@media (max-width:900px) {
  .title-wrap{font-size:24px}
  .content{height:calc(100vh - 150px)}
}
</style>
</head>

      <button class="main-tab" type="button" data-view="settings">الإعدادات العامة ⚙</button>
    </div>
  </div>
</header>

const frame = document.getElementById('appFrame');

function decodeB64Unicode(str) {
  const bytes = Uint8Array.from(atob(str), c => c.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}

function loadView(name) {
  const raw = decodeB64Unicode(docs[name] || docs.customers);
  frame.srcdoc = raw;
}

document.querySelectorAll('.main-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.main-tab').forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
    loadView(btn.dataset.view || 'customers');
  });
});

loadView('customers');
